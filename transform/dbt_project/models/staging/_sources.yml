version: 2

sources:
  - name: silver
    schema: silver
    description: "Bereinigte Stellenanzeigen aus der Silver-Schicht. Multi-Source mit Cross-Source-Dedup."
    tables:
      - name: stellenanzeigen
        description: "Pro Adzuna-/BA-/Muse-/Remotive-/Jobicy-Stellenanzeige eine Zeile mit normalisierten Feldern."
        columns:
          - name: job_id
            description: "Deterministischer Primaerschluessel aus (quelle, quell_id). Auf Source-Ebene kann er mehrfach auftreten, wenn der Tag mehrfach geschrieben wurde; Staging dedupliziert das."
            tests:
              - not_null
          - name: quelle
            tests:
              - not_null
          - name: titel
            tests:
              - not_null
