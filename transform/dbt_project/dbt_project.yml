name: 'djr'
version: '0.1.0'
config-version: 2

profile: 'djr'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  djr:
    staging:
      +materialized: view
      +schema: silver
    marts:
      +materialized: table
      +schema: gold

seeds:
  djr:
    +schema: silver
