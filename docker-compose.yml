name: data-job-radar

# Topologie:
# - "backend" laeuft auf 127.0.0.1:8081 und stellt API + statisches Frontend bereit.
# - Host-Nginx proxyt von Port 80/443 (pgadmin.thetransporterlabs.de) auf 127.0.0.1:8081.
# - "airflow-scheduler" orchestriert die 9-Quellen-Pipeline; Webserver intern auf 8080.
# - "postgres" speichert ausschliesslich Airflow-Metadaten (kein Anwendungs-DB).
# - Quellen-Status (/data/warehouse/quellen_status.json) wird vom Scheduler geschrieben,
#   vom Backend gelesen (read-only Mount).

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/docker/airflow.Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    ADZUNA_APP_ID: ${ADZUNA_APP_ID}
    ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
    ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-de}
    JOOBLE_API_KEY: ${JOOBLE_API_KEY:-}
    JOOBLE_QUOTA_GRENZE: ${JOOBLE_QUOTA_GRENZE:-500}
    RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
    JSEARCH_QUOTA_GRENZE: ${JSEARCH_QUOTA_GRENZE:-200}
    QUOTA_ALERT_EMAIL: ${QUOTA_ALERT_EMAIL:-jeunaj3@gmail.com}
    DATA_LAKE_ROOT: /data/lake
    DUCKDB_PATH: /data/warehouse/djr.duckdb
    QUELLEN_STATUS_PFAD: /data/warehouse/quellen_status.json
    QUOTA_DB_PATH: /data/warehouse/quota.db
    LOG_FORMAT: ${LOG_FORMAT:-json}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${SMTP_STARTTLS:-True}
    AIRFLOW__SMTP__SMTP_SSL: ${SMTP_SSL:-False}
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_MAIL_FROM:-}
  volumes:
    - ./orchestration/dags:/opt/airflow/dags:ro
    - ./shared/python/djr_core/djr_core:/opt/airflow/djr_core:ro
    - ./ingestion:/opt/airflow/ingestion:ro
    - ./data_lake:/opt/airflow/data_lake:ro
    - ./skills:/opt/airflow/skills:ro
    - ./analytics:/opt/airflow/analytics:ro
    - ./transform:/opt/airflow/transform
    - djr-lake:/data/lake
    - djr-warehouse:/data/warehouse
    - airflow-logs:/opt/airflow/logs

services:
  volume-permissions:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - djr-lake:/data/lake
      - djr-warehouse:/data/warehouse
      - djr-userdata:/data/userdata
      - airflow-logs:/opt/airflow/logs
    command: sh -c "mkdir -p /data/lake/bronze /data/lake/silver /data/lake/gold /data/warehouse /data/userdata && chown -R 50000:0 /data/lake /data/warehouse /opt/airflow/logs && chown -R 1000:0 /data/userdata && chmod -R 0775 /data/lake /data/warehouse /opt/airflow/logs /data/userdata"
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
      volume-permissions:
        condition: service_completed_successfully
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --role Admin --username admin --password admin --firstname Admin --lastname User --email admin@example.com || true"
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-de}
      BACKEND_PORT: ${BACKEND_PORT:-8081}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      BACKEND_CACHE_TTL_SECONDS: ${BACKEND_CACHE_TTL_SECONDS:-300}
      BACKEND_RATE_LIMIT_PER_MINUTE: ${BACKEND_RATE_LIMIT_PER_MINUTE:-120}
      USER_DATA_PATH: /data/userdata/nutzer.db
      DATA_LAKE_ROOT: /data/lake
      DUCKDB_PATH: /data/warehouse/djr.duckdb
      QUELLEN_STATUS_PFAD: /data/warehouse/quellen_status.json
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - djr-lake:/data/lake:ro
      - djr-warehouse:/data/warehouse:ro
      - djr-userdata:/data/userdata
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:8081/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres-data:
  airflow-logs:
  djr-lake:
  djr-warehouse:
  djr-userdata:
