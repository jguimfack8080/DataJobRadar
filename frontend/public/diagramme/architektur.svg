<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 840" font-family="Inter, system-ui, sans-serif" font-size="13">
  <style>
    .knoten { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
    .pfeil { stroke: #000000; stroke-width: 1.5; fill: none; }
    .titel { font-weight: 700; }
    .text { fill: #000000; text-anchor: middle; dominant-baseline: middle; }
    .links { text-anchor: start; }
    .gruppentitel { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .meta { font-size: 11px; fill: #555555; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff" />

  <text x="600" y="36" class="text titel" font-size="18">Systemarchitektur Data Job Radar Deutschland</text>
  <text x="600" y="58" class="text meta">Sieben Schichten, klar voneinander getrennt; fuenf Quellen, eine API</text>

  <text x="60" y="100" class="text links gruppentitel">QUELLEN</text>
  <rect x="60" y="110" width="220" height="50" rx="10" class="knoten" />
  <text x="170" y="135" class="text titel">Bundesagentur f. Arbeit</text>
  <rect x="60" y="170" width="220" height="50" rx="10" class="knoten" />
  <text x="170" y="195" class="text titel">Adzuna</text>
  <rect x="60" y="230" width="220" height="50" rx="10" class="knoten" />
  <text x="170" y="255" class="text titel">The Muse</text>
  <rect x="60" y="290" width="220" height="50" rx="10" class="knoten" />
  <text x="170" y="315" class="text titel">Remotive</text>
  <rect x="60" y="350" width="220" height="50" rx="10" class="knoten" />
  <text x="170" y="375" class="text titel">Jobicy</text>

  <text x="60" y="430" class="text links gruppentitel">INGESTION</text>
  <rect x="60" y="440" width="220" height="80" rx="10" class="knoten" />
  <text x="170" y="465" class="text titel">Multi-Source Pipeline</text>
  <text x="170" y="485" class="text meta">Base-Client + 5 Adapter</text>
  <text x="170" y="502" class="text meta">validiert, idempotent</text>

  <text x="60" y="550" class="text links gruppentitel">DATA LAKE</text>
  <rect x="60" y="560" width="100" height="70" rx="10" class="knoten" />
  <text x="110" y="585" class="text titel">Bronze</text>
  <text x="110" y="605" class="text meta">partitioniert</text>
  <text x="110" y="620" class="text meta">nach Quelle</text>
  <rect x="180" y="560" width="100" height="70" rx="10" class="knoten" />
  <text x="230" y="585" class="text titel">Silver</text>
  <text x="230" y="605" class="text meta">Cross-Source</text>
  <text x="230" y="620" class="text meta">Dedup</text>
  <rect x="60" y="650" width="220" height="60" rx="10" class="knoten" />
  <text x="170" y="675" class="text titel">Gold (dbt)</text>
  <text x="170" y="694" class="text meta">Sternschema, unique-Test</text>

  <text x="60" y="740" class="text links gruppentitel">WAREHOUSE</text>
  <rect x="60" y="750" width="220" height="60" rx="10" class="knoten" />
  <text x="170" y="775" class="text titel">DuckDB</text>
  <text x="170" y="794" class="text meta">prozessintern</text>

  <text x="400" y="100" class="text links gruppentitel">SERVICE</text>
  <rect x="400" y="110" width="240" height="80" rx="10" class="knoten" />
  <text x="520" y="135" class="text titel">FastAPI</text>
  <text x="520" y="155" class="text meta">Pydantic, Cache, Rate Limit</text>
  <text x="520" y="172" class="text meta">Filter inkl. quelle (Mehrfach)</text>

  <rect x="400" y="220" width="240" height="80" rx="10" class="knoten" />
  <text x="520" y="245" class="text titel">Next.js Dashboard</text>
  <text x="520" y="265" class="text meta">statisch exportiert</text>
  <text x="520" y="282" class="text meta">Quellen-Badge, Quellen-Filter</text>

  <rect x="400" y="330" width="240" height="80" rx="10" class="knoten" />
  <text x="520" y="355" class="text titel">Endnutzer (HTTPS)</text>
  <text x="520" y="375" class="text meta">pgadmin.thetransporterlabs.de</text>
  <text x="520" y="392" class="text meta">via Host-Nginx</text>

  <text x="400" y="450" class="text links gruppentitel">QUALITAET</text>
  <rect x="400" y="460" width="240" height="80" rx="10" class="knoten" />
  <text x="520" y="485" class="text titel">dbt-Tests + Quarantaene</text>
  <text x="520" y="505" class="text meta">unique fact_jobs.job_id</text>
  <text x="520" y="522" class="text meta">not_null, relationships</text>

  <text x="400" y="560" class="text links gruppentitel">BEOBACHTBARKEIT</text>
  <rect x="400" y="570" width="240" height="80" rx="10" class="knoten" />
  <text x="520" y="595" class="text titel">structlog</text>
  <text x="520" y="615" class="text meta">Korrelationskennung</text>
  <text x="520" y="632" class="text meta">je Lauf und je Quelle</text>

  <text x="400" y="670" class="text links gruppentitel">SICHERHEIT</text>
  <rect x="400" y="680" width="240" height="80" rx="10" class="knoten" />
  <text x="520" y="705" class="text titel">.env + Rate Limit + CORS</text>
  <text x="520" y="725" class="text meta">Loopback nur extern</text>
  <text x="520" y="742" class="text meta">Geheimnisse nicht im Code</text>

  <text x="780" y="100" class="text links gruppentitel">BETRIEB</text>
  <rect x="780" y="110" width="380" height="80" rx="10" class="knoten" />
  <text x="970" y="135" class="text titel">Apache Airflow (LocalExecutor)</text>
  <text x="970" y="155" class="text meta">arbeitsmarkt_data_pipeline</text>
  <text x="970" y="172" class="text meta">4x taeglich, max_active_runs=1</text>

  <rect x="780" y="220" width="180" height="60" rx="10" class="knoten" />
  <text x="870" y="245" class="text titel">Postgres</text>
  <text x="870" y="264" class="text meta">nur Airflow Metadaten</text>
  <rect x="980" y="220" width="180" height="60" rx="10" class="knoten" />
  <text x="1070" y="245" class="text titel">Docker Compose</text>
  <text x="1070" y="264" class="text meta">Healthchecks, Volumes</text>

  <rect x="780" y="310" width="180" height="60" rx="10" class="knoten" />
  <text x="870" y="335" class="text titel">SMTP-Alerts</text>
  <text x="870" y="354" class="text meta">Mail bei Pipeline-Fehlern</text>
  <rect x="980" y="310" width="180" height="60" rx="10" class="knoten" />
  <text x="1070" y="335" class="text titel">Host-Nginx</text>
  <text x="1070" y="354" class="text meta">HTTPS Terminator</text>

  <text x="780" y="430" class="text links gruppentitel">DUPLIKAT-GARANTIE</text>
  <rect x="780" y="440" width="380" height="180" rx="10" class="knoten" />
  <text x="800" y="465" class="text links titel">Vier unabhaengige Schutzebenen</text>
  <text x="800" y="490" class="text links meta">1. Bronze: Korrelationskennung je Schreibvorgang</text>
  <text x="800" y="510" class="text links meta">2. Silver intra-Quelle: ROW_NUMBER OVER (quelle, quell_id)</text>
  <text x="800" y="530" class="text links meta">3. Silver cross-Quelle: ROW_NUMBER OVER (dedup_signatur)</text>
  <text x="800" y="546" class="text links meta">   sortiert nach Quellen-Prioritaet</text>
  <text x="800" y="570" class="text links meta">4. dbt: not_null + unique-Test auf fact_jobs.job_id</text>
  <text x="800" y="594" class="text links meta">Prioritaet: BA &gt; Adzuna &gt; Muse &gt; Remotive &gt; Jobicy</text>

  <path class="pfeil" d="M280 135 L60 460" marker-end="url(#pa)" />
  <path class="pfeil" d="M280 195 L60 470" marker-end="url(#pa)" />
  <path class="pfeil" d="M280 255 L60 480" marker-end="url(#pa)" />
  <path class="pfeil" d="M280 315 L60 490" marker-end="url(#pa)" />
  <path class="pfeil" d="M280 375 L60 500" marker-end="url(#pa)" />

  <path class="pfeil" d="M110 630 L110 650" marker-end="url(#pa)" />
  <path class="pfeil" d="M230 630 L170 650" marker-end="url(#pa)" />
  <path class="pfeil" d="M170 710 L170 750" marker-end="url(#pa)" />

  <path class="pfeil" d="M280 780 L520 200" marker-end="url(#pa)" />
  <path class="pfeil" d="M520 190 L520 220" marker-end="url(#pa)" />
  <path class="pfeil" d="M520 300 L520 330" marker-end="url(#pa)" />

  <defs>
    <marker id="pa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#000000" />
    </marker>
  </defs>
</svg>
