<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, system-ui, sans-serif" font-size="13">
  <style>
    .schicht { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
    .titel { font-weight: 700; font-size: 16px; }
    .sub { font-size: 11px; fill: #555555; font-style: italic; }
    .text { fill: #000000; }
    .mitte { text-anchor: middle; dominant-baseline: middle; }
    .links { text-anchor: start; dominant-baseline: middle; }
    .pfeil { stroke: #000000; stroke-width: 2; fill: none; }
    .label { font-weight: 700; font-size: 12px; letter-spacing: 0.5px; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff" />

  <text x="600" y="40" class="text mitte titel" font-size="20">Medallion Architecture</text>
  <text x="600" y="64" class="text mitte sub">Bronze, Silver und Gold als drei Stufen der Datenveredelung</text>

  <rect x="60" y="120" width="340" height="540" rx="14" class="schicht" />
  <text x="230" y="160" class="text mitte titel">Bronze</text>
  <text x="230" y="185" class="text mitte sub">Roh, unveraendert, auditierbar</text>

  <text x="84" y="240" class="text links label">INHALT</text>
  <text x="84" y="265" class="text links">Validierte Adzuna-</text>
  <text x="84" y="285" class="text links">Antworten je Tag und</text>
  <text x="84" y="305" class="text links">Kategorie.</text>

  <text x="84" y="350" class="text links label">FORMAT</text>
  <text x="84" y="375" class="text links">Parquet mit Zstd-</text>
  <text x="84" y="395" class="text links">Kompression.</text>

  <text x="84" y="440" class="text links label">PARTITIONIERUNG</text>
  <text x="84" y="465" class="text links">jahr / monat / tag /</text>
  <text x="84" y="485" class="text links">kategorie / seite</text>

  <text x="84" y="530" class="text links label">GARANTIEN</text>
  <text x="84" y="555" class="text links">Idempotent, dedupliziert</text>
  <text x="84" y="575" class="text links">nach Adzuna-ID,</text>
  <text x="84" y="595" class="text links">Quarantaene fuer Schema-</text>
  <text x="84" y="615" class="text links">verletzungen.</text>

  <rect x="430" y="120" width="340" height="540" rx="14" class="schicht" />
  <text x="600" y="160" class="text mitte titel">Silver</text>
  <text x="600" y="185" class="text mitte sub">Bereinigt, normalisiert, angereichert</text>

  <text x="454" y="240" class="text links label">INHALT</text>
  <text x="454" y="265" class="text links">Eine Zeile pro</text>
  <text x="454" y="285" class="text links">eindeutiger Anzeige je</text>
  <text x="454" y="305" class="text links">Tag.</text>

  <text x="454" y="350" class="text links label">ENGINE</text>
  <text x="454" y="375" class="text links">DuckDB SQL, in-memory.</text>

  <text x="454" y="420" class="text links label">TRANSFORMATIONEN</text>
  <text x="454" y="445" class="text links">Standort-Normalisierung,</text>
  <text x="454" y="465" class="text links">Unternehmens-Trim,</text>
  <text x="454" y="485" class="text links">Gehalt-Mittelwert,</text>
  <text x="454" y="505" class="text links">Skill-Extraktion ueber</text>
  <text x="454" y="525" class="text links">Regex-Taxonomie.</text>

  <text x="454" y="570" class="text links label">FORMAT</text>
  <text x="454" y="595" class="text links">Parquet, eine Datei je</text>
  <text x="454" y="615" class="text links">Datum.</text>

  <rect x="800" y="120" width="340" height="540" rx="14" class="schicht" />
  <text x="970" y="160" class="text mitte titel">Gold</text>
  <text x="970" y="185" class="text mitte sub">Analytisch optimiert, Sternschema</text>

  <text x="824" y="240" class="text links label">INHALT</text>
  <text x="824" y="265" class="text links">fact_jobs, fact_skills,</text>
  <text x="824" y="285" class="text links">dim_company,</text>
  <text x="824" y="305" class="text links">dim_location, dim_date.</text>

  <text x="824" y="350" class="text links label">ENGINE</text>
  <text x="824" y="375" class="text links">dbt Core mit dbt-duckdb.</text>

  <text x="824" y="420" class="text links label">QUALITAET</text>
  <text x="824" y="445" class="text links">dbt tests: unique,</text>
  <text x="824" y="465" class="text links">not_null, relationships,</text>
  <text x="824" y="485" class="text links">accepted_values.</text>

  <text x="824" y="530" class="text links label">KONSUM</text>
  <text x="824" y="555" class="text links">FastAPI liest read-only</text>
  <text x="824" y="575" class="text links">und liefert typisierte</text>
  <text x="824" y="595" class="text links">JSON-Antworten an das</text>
  <text x="824" y="615" class="text links">Dashboard.</text>

  <path class="pfeil" d="M 400 390 L 430 390" marker-end="url(#pfm)" />
  <path class="pfeil" d="M 770 390 L 800 390" marker-end="url(#pfm)" />

  <text x="600" y="700" class="text mitte sub">Jede Schicht ist eigenstaendig auditierbar; Probleme lassen sich auf die genaue Stufe zurueckverfolgen.</text>

  <defs>
    <marker id="pfm" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#000000" />
    </marker>
  </defs>
</svg>
